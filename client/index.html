<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <!-- maximum-scale entfernt: Pinch-Zoom muss für Barrierefreiheit (WCAG 1.4.4) möglich bleiben -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Trichterwerk - Erstelle mobile-optimierte Marketing-Funnels für Lead-Generierung, höhere Conversions und mehr Kunden." />
    <link rel="canonical" href="https://trichterwerk.de/" />

    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Trichterwerk - Funnel Builder" />
    <meta property="og:description" content="Erstelle mobile-optimierte Marketing-Funnels für Lead-Generierung, höhere Conversions und mehr Kunden." />
    <meta property="og:image" content="https://trichterwerk.de/images/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Trichterwerk - Funnel Builder" />
    <meta name="twitter:description" content="Erstelle mobile-optimierte Marketing-Funnels für Lead-Generierung, höhere Conversions und mehr Kunden." />
    <meta name="twitter:image" content="https://trichterwerk.de/images/og-image.png" />
    
    <title>Trichterwerk - Funnel Builder</title>
    
    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/images/favicon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/images/favicon-512.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    
    <!-- Schriften werden selbst gehostet (@fontsource, siehe main.tsx) —
         kein Laden von Google-Servern (DSGVO: IP-Übertragung ohne Consent) -->

    <!-- Strukturierte Daten (JSON-LD) für SEO -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://trichterwerk.de/#organization",
          "name": "Trichterwerk",
          "url": "https://trichterwerk.de/",
          "logo": "https://trichterwerk.de/images/logo.webp",
          "email": "info@superbrand.marketing",
          "founder": { "@type": "Person", "name": "Dennis Sasse" },
          "parentOrganization": { "@type": "Organization", "name": "SUPERBRAND.marketing", "url": "https://superbrand.marketing" }
        },
        {
          "@type": "SoftwareApplication",
          "name": "Trichterwerk",
          "applicationCategory": "BusinessApplication",
          "operatingSystem": "Web",
          "url": "https://trichterwerk.de/",
          "description": "Deutscher Funnel-Builder für mobile-optimierte Landingpages und Lead-Funnels — Drag-and-Drop, Templates, bedingte Logik, DSGVO-konform mit Hosting in der EU.",
          "inLanguage": "de",
          "publisher": { "@id": "https://trichterwerk.de/#organization" },
          "offers": {
            "@type": "Offer",
            "price": "49",
            "priceCurrency": "EUR",
            "description": "Pro-Plan, monatlich kündbar, 14 Tage kostenlos testen"
          }
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
