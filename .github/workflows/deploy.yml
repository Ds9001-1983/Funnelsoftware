name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Nur ein Deploy gleichzeitig: neue Pushes in schneller Folge werden
# gereiht, nicht parallel ausgeführt. Sonst konkurrieren mehrere
# `npm ci` + `npm run build` um /var/www/funnelflow und kippen sich
# gegenseitig (zuletzt beobachtet: „Could not resolve ./_hashClear").
# cancel-in-progress: false → laufender Deploy wird nicht abgebrochen,
# sondern läuft sauber zu Ende; nachfolgende Pushes warten.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Hetzner Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd /var/www/funnelflow

            # Pull latest code
            git fetch origin
            git reset --hard origin/${{ github.ref_name }}

            # Install dependencies
            npm ci

            # Build the application (GATE: abort deploy on failure)
            if ! npm run build; then
              echo "BUILD FAILED - aborting deployment!"
              exit 1
            fi

            # Verify build output exists
            if [ ! -d "dist/public" ]; then
              echo "Build output missing - aborting deployment!"
              exit 1
            fi

            # Run database migrations (without --force to preserve data).
            # GATE: Ein fehlgeschlagener Schema-Push bricht den Deploy ab —
            # vorher wurden Fehler verschluckt (2>/dev/null || echo) und der
            # neue Code lief gegen ein altes Schema (Schema-Drift → 500er).
            if ! npx drizzle-kit push; then
              echo "DB-MIGRATION FAILED - aborting deployment (Code nicht neu gestartet)!"
              exit 1
            fi

            # Restart PM2 (only after successful build).
            # .env exportieren und MIT --update-env neu starten: PM2 behält
            # sonst die Umgebung vom letzten Start, und ein frisch in die .env
            # geschriebenes Secret (z. B. META_CAPI_TOKEN) bliebe im Prozess
            # lautlos leer — die App läuft weiter, das Feature ist tot, und der
            # Fehler sieht aus wie ein Code-Bug.
            # `set -a` + `.` statt `export $(cat .env | xargs)`, weil Letzteres
            # an Werten mit Leerzeichen oder Anführungszeichen zerbricht.
            if [ -f .env ]; then
              set -a
              . ./.env
              set +a
            fi
            pm2 restart funnelflow --update-env || pm2 start dist/index.cjs --name funnelflow

            # Save PM2 config
            pm2 save

            # Health check gegen /api/health (prüft DB-Verbindung).
            # Timeout ist jetzt ein ECHTER Fehler — der alte Check gegen
            # statisches HTML konnte nie fehlschlagen.
            echo "Running health check..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost:5000/api/health > /dev/null 2>&1; then
                echo "Health check passed! Deployment successful."
                exit 0
              fi
              echo "Waiting for server... (attempt $i/30)"
              sleep 2
            done

            echo "ERROR: Health check timed out after 60s - deployment FAILED"
            pm2 logs funnelflow --lines 50 --nostream || true
            exit 1
