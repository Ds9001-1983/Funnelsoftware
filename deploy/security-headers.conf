# Security Headers Snippet — eingebunden in Location-Blöcke mit eigenen add_header
# Kopiere nach: /etc/nginx/snippets/security-headers.conf
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header X-XSS-Protection "0" always;
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(self)" always;
# WICHTIG: Auf Node-proxied Routen (/f/, /api/, Marketing-Seiten) setzt Helmet
# (server/index.ts) einen ZWEITEN CSP-Header — Browser erzwingen die SCHNITTMENGE
# beider Policies. Diese Zeile MUSS deshalb 1:1 mit der Helmet-Policy in
# server/index.ts synchron bleiben, sonst blockiert die strengere alte Fassung
# neue Hosts (so geschehen mit connect.facebook.net fürs Meta-Pixel).
# Google-Font-Hosts bewusst NICHT erlaubt (Fonts sind selbst gehostet via
# @fontsource, kein Pre-Consent-Leak) — identisch zu Helmet.
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://js.stripe.com https://connect.facebook.net; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: https: blob:; connect-src 'self' https://www.google-analytics.com https://api.stripe.com https://www.facebook.com; frame-src 'self' https://js.stripe.com https://www.youtube.com https://www.youtube-nocookie.com https://player.vimeo.com https://calendly.com https://cal.com https://app.cal.com; object-src 'none'; base-uri 'self'; form-action 'self'; media-src 'self' https: blob:;" always;
