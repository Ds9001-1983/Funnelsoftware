# Trichterwerk nginx-Konfiguration
# /etc/nginx/sites-available/trichterwerk
#
# Diese Konfig liefert statische Assets direkt aus (kein Proxy),
# damit Bilder nicht durch den SPA-Fallback als index.html kommen.

upstream trichterwerk_backend {
    server 127.0.0.1:5000;
    keepalive 64;
}

server {
    listen 80;
    server_name trichterwerk.de www.trichterwerk.de;
    # ACME-Webroot auch hier: erlaubt perspektivisch die Migration des
    # Haupt-Zertifikats vom nginx-Plugin auf webroot.
    location /.well-known/acme-challenge/ { root /var/www/letsencrypt; }
    location / { return 301 https://trichterwerk.de$request_uri; }
}

# Catch-all für Custom Domains auf Port 80: bedient die ACME-Challenges für
# certbot --webroot (Erstausstellung UND Renewals der Kunden-Zertifikate),
# alles andere geht auf HTTPS. Kunden-Domains haben hier bewusst keinen
# eigenen 80er-Block — dieser eine reicht für alle.
server {
    listen 80 default_server;
    server_name _;
    location /.well-known/acme-challenge/ { root /var/www/letsencrypt; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    server_name www.trichterwerk.de;

    ssl_certificate     /etc/letsencrypt/live/trichterwerk.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trichterwerk.de/privkey.pem;

    return 301 https://trichterwerk.de$request_uri;
}

server {
    listen 443 ssl http2;
    server_name trichterwerk.de;

    # SSL (managed by certbot)
    ssl_certificate     /etc/letsencrypt/live/trichterwerk.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trichterwerk.de/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "0" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(self)" always;

    # Vite-Build Output
    root /var/www/funnelflow/dist/public;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # ============================================
    # STATISCHE DATEIEN — kein SPA-Fallback!
    # ============================================

    # Bilder mit aggressivem Caching
    location /images/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept";
        include /etc/nginx/snippets/security-headers.conf;
    }

    location /templates/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept";
        include /etc/nginx/snippets/security-headers.conf;
    }

    # User-Uploads
    location /uploads/ {
        alias /var/www/funnelflow/uploads/;
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
        include /etc/nginx/snippets/security-headers.conf;
    }

    # Favicons und statische Root-Dateien
    location = /favicon.ico  { try_files $uri =404; expires 30d; }
    location = /favicon.png  { try_files $uri =404; expires 30d; }
    location = /apple-touch-icon.png { try_files $uri =404; expires 30d; }
    location = /robots.txt   { try_files $uri =404; default_type text/plain; }

    # Sitemap wird dynamisch von der Node-App erzeugt (statische Seiten +
    # veröffentlichte Funnels) — daher proxien statt statisch ausliefern.
    location = /sitemap.xml {
        proxy_pass http://trichterwerk_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Vite-Build Assets (JS/CSS mit Content-Hash → 1 Jahr Cache)
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
        include /etc/nginx/snippets/security-headers.conf;
    }

    # index.html darf nie gecacht werden: Ohne Cache-Control cachen Browser
    # heuristisch (Last-Modified) — nach einem Deploy referenziert veraltetes
    # HTML dann gelöschte Hash-Chunks (Chunk-404 → Fehlerseite). no-cache
    # erlaubt Caching, erzwingt aber Revalidierung (ETag/304). Greift auch für
    # den SPA-Fallback: der interne Redirect von try_files durchläuft das
    # Location-Matching erneut. security-headers.conf muss rein, weil
    # add_header-Vererbung bei lokalem add_header bricht.
    location = /index.html {
        add_header Cache-Control "no-cache" always;
        include /etc/nginx/snippets/security-headers.conf;
    }

    # ============================================
    # API + WebSocket → Express Backend
    # ============================================
    location /api/ {
        proxy_pass http://trichterwerk_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        include /etc/nginx/snippets/security-headers.conf;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # Stripe Webhook
    location /api/webhooks/stripe {
        proxy_pass http://trichterwerk_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Raw body needed for Stripe signature verification
        proxy_request_buffering on;
        client_max_body_size 1m;
    }

    # Öffentliche Funnels an die Node-App weiterreichen, damit funnel-spezifische
    # Meta-Tags (Titel/OG/Canonical) server-seitig injiziert werden — sonst sähen
    # Share-Bots nur die generische index.html. Assets (/assets, /images, …)
    # matchen weiterhin ihre spezifischeren Blöcke oben.
    location /f/ {
        proxy_pass http://trichterwerk_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        include /etc/nginx/snippets/security-headers.conf;
    }

    # SEO-Marketing-Seiten ebenfalls an die Node-App: server-seitige Meta-Injektion
    # (Title/Description/OG aus shared/seo-content.ts) statt generischer index.html.
    # Regex statt Exact-Match, damit auch /funnel-builder/ (Trailing-Slash) die
    # Injektion bekommt — Node normalisiert den Pfad.
    location ~ ^/(funnel-builder|recruiting-funnel|lead-funnel)/?$ {
        proxy_pass http://trichterwerk_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        include /etc/nginx/snippets/security-headers.conf;
    }

    location /vergleich/ {
        proxy_pass http://trichterwerk_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        include /etc/nginx/snippets/security-headers.conf;
    }

    # Template-Galerie (/vorlagen + /vorlagen/<slug>) ebenfalls an die Node-App
    # für die Meta-Injektion. Regex, damit Index UND Detailseiten (auch mit
    # Trailing-Slash) matchen; /templates/ (statische Assets) bleibt unberührt.
    location ~ ^/vorlagen(/.*)?$ {
        proxy_pass http://trichterwerk_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        include /etc/nginx/snippets/security-headers.conf;
    }

    # ============================================
    # SPA-FALLBACK — nur für HTML-Routen
    # ============================================
    location / {
        try_files $uri $uri/ /index.html;
        include /etc/nginx/snippets/security-headers.conf;
    }
}

# Von domain-provisioner.sh generierte Custom-Domain-vhosts (443-Blöcke mit
# eigenem Let's-Encrypt-Zertifikat). Diese Datei liegt via sites-enabled im
# http-Kontext — das include ist hier also gültig. Ein leerer Glob ist ok.
include /etc/nginx/customer-domains/*.conf;
