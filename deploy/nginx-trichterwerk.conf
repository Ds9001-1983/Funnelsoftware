# Trichterwerk nginx-Konfiguration
# /etc/nginx/sites-available/trichterwerk
#
# Diese Konfig liefert statische Assets direkt aus (kein Proxy),
# damit Bilder nicht durch den SPA-Fallback als index.html kommen.

upstream trichterwerk_backend {
    server 127.0.0.1:5000;
    keepalive 64;
}

server {
    listen 80;
    server_name trichterwerk.de www.trichterwerk.de;
    return 301 https://trichterwerk.de$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.trichterwerk.de;

    ssl_certificate     /etc/letsencrypt/live/trichterwerk.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trichterwerk.de/privkey.pem;

    return 301 https://trichterwerk.de$request_uri;
}

server {
    listen 443 ssl http2;
    server_name trichterwerk.de;

    # SSL (managed by certbot)
    ssl_certificate     /etc/letsencrypt/live/trichterwerk.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trichterwerk.de/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "0" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(self)" always;

    # Vite-Build Output
    root /var/www/trichterwerk/dist/public;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # ============================================
    # STATISCHE DATEIEN — kein SPA-Fallback!
    # ============================================

    # Bilder mit aggressivem Caching
    location /images/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept";
        include /etc/nginx/snippets/security-headers.conf;
    }

    location /templates/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept";
        include /etc/nginx/snippets/security-headers.conf;
    }

    # User-Uploads
    location /uploads/ {
        alias /var/www/trichterwerk/uploads/;
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
        include /etc/nginx/snippets/security-headers.conf;
    }

    # Favicons und statische Root-Dateien
    location = /favicon.ico  { try_files $uri =404; expires 30d; }
    location = /favicon.png  { try_files $uri =404; expires 30d; }
    location = /apple-touch-icon.png { try_files $uri =404; expires 30d; }
    location = /robots.txt   { try_files $uri =404; default_type text/plain; }
    location = /sitemap.xml  { try_files $uri =404; default_type application/xml; }

    # Vite-Build Assets (JS/CSS mit Content-Hash → 1 Jahr Cache)
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
        include /etc/nginx/snippets/security-headers.conf;
    }

    # ============================================
    # API + WebSocket → Express Backend
    # ============================================
    location /api/ {
        proxy_pass http://trichterwerk_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        include /etc/nginx/snippets/security-headers.conf;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # Stripe Webhook
    location /api/webhooks/stripe {
        proxy_pass http://trichterwerk_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Raw body needed for Stripe signature verification
        proxy_request_buffering on;
        client_max_body_size 1m;
    }

    # ============================================
    # SPA-FALLBACK — nur für HTML-Routen
    # ============================================
    location / {
        try_files $uri $uri/ /index.html;
        include /etc/nginx/snippets/security-headers.conf;
    }
}
