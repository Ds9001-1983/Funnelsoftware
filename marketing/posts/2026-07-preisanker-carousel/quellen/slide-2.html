<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Trichterwerk — Carousel Preis-Anker — Slide 2 (Problem)</title>
<style>
  @font-face { font-family:'Inter'; font-style:normal; font-weight:500; src:url('file:///Users/dennissasse/Desktop/DEV/Trichterwerk/Funnelsoftware/node_modules/@fontsource/inter/files/inter-latin-500-normal.woff2') format('woff2'); }
  @font-face { font-family:'Inter'; font-style:normal; font-weight:600; src:url('file:///Users/dennissasse/Desktop/DEV/Trichterwerk/Funnelsoftware/node_modules/@fontsource/inter/files/inter-latin-600-normal.woff2') format('woff2'); }
  @font-face { font-family:'Inter'; font-style:normal; font-weight:700; src:url('file:///Users/dennissasse/Desktop/DEV/Trichterwerk/Funnelsoftware/node_modules/@fontsource/inter/files/inter-latin-700-normal.woff2') format('woff2'); }
  @font-face { font-family:'Inter'; font-style:normal; font-weight:800; src:url('file:///Users/dennissasse/Desktop/DEV/Trichterwerk/Funnelsoftware/node_modules/@fontsource/inter/files/inter-latin-800-normal.woff2') format('woff2'); }

  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { margin:0; width:100vw; height:100vh; overflow:hidden; background:#0E0E11; }
  body { font-family:'Inter', sans-serif; -webkit-font-smoothing:antialiased; }

  .stage { position:relative; width:100vw; height:100vh; overflow:hidden; background:#0E0E11; }

  .dots {
    position:absolute; inset:0;
    background-image:radial-gradient(rgba(255,255,255,0.07) 1.5px, transparent 1.5px);
    background-size:38px 38px; background-position:19px 19px;
  }
  .topwash {
    position:absolute; left:0; right:0; top:0; height:420px;
    background:radial-gradient(ellipse 900px 380px at 50% -120px, rgba(124,58,237,0.20) 0%, rgba(124,58,237,0) 70%);
  }
  .glow {
    position:absolute; left:50%; top:52%; width:1400px; height:1400px;
    transform:translate(-50%,-50%);
    background:radial-gradient(circle, rgba(124,58,237,0.22) 0%, rgba(124,58,237,0.09) 34%, rgba(124,58,237,0) 66%);
  }
  .orb { position:absolute; border-radius:50%; filter:blur(90px); }
  .orb-1 { width:420px; height:420px; left:700px; top:-100px;  background:rgba(124,58,237,0.20); }
  .orb-2 { width:360px; height:360px; left:-160px; bottom:20px; background:rgba(91,33,182,0.26); }

  .frame { position:absolute; inset:0; padding:74px 80px; display:flex; flex-direction:column; }
  .head { flex:none; }
  .body { flex:1; display:flex; flex-direction:column; justify-content:center; }
  .foot { flex:none; display:flex; align-items:center; justify-content:flex-end; }

  .brand { display:flex; align-items:center; gap:16px; }
  .brand-tile {
    width:54px; height:54px; border-radius:15px;
    background:linear-gradient(135deg, #925CF0 0%, #7C3AED 55%, #5B21B6 100%);
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 8px 28px rgba(124,58,237,0.45);
  }
  .brand-name { font-size:34px; font-weight:700; color:#F2F2F2; letter-spacing:-0.01em; }
  .counter { font-size:26px; font-weight:600; color:rgba(242,242,242,0.42); letter-spacing:0.02em; }

  /* ---------- Inhalt Slide 2 ---------- */
  h2 {
    font-size:66px; font-weight:800; letter-spacing:-0.025em; line-height:1.14;
    color:#FFFFFF;
  }
  h2 .grad {
    background:linear-gradient(94deg, #C4B5FD 0%, #925CF0 55%, #7C3AED 100%);
    -webkit-background-clip:text; background-clip:text;
    -webkit-text-fill-color:transparent; color:transparent;
  }

  .steps { margin-top:64px; display:flex; flex-direction:column; gap:22px; }
  .step {
    display:flex; align-items:center; gap:28px;
    padding:28px 34px; border-radius:24px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.11);
  }
  .num {
    flex:none; width:56px; height:56px; border-radius:16px;
    background:rgba(124,58,237,0.22);
    border:1px solid rgba(146,92,240,0.45);
    display:flex; align-items:center; justify-content:center;
    font-size:28px; font-weight:700; color:#C4B5FD;
  }
  .step-label { font-size:37px; font-weight:600; color:#F2F2F2; letter-spacing:-0.01em; }

  .close {
    margin-top:60px;
    font-size:40px; font-weight:700; line-height:1.35; letter-spacing:-0.015em;
    color:#FFFFFF;
  }
  .close .dim { color:rgba(242,242,242,0.62); font-weight:500; }
</style>
</head>
<body>
  <div class="stage">
    <div class="glow"></div>
    <div class="topwash"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="dots"></div>

    <div class="frame">
      <div class="head">
        <div class="brand">
          <div class="brand-tile">
            <svg width="30" height="30" viewBox="0 0 32 32" fill="none">
              <path d="M6 7 H26 L18.5 19 V26 L13.5 23.5 V19 Z" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="3" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="brand-name">Trichterwerk</div>
        </div>
      </div>

      <div class="body">
        <h2>Wofür du bei einer<br>Agentur <span class="grad">wartest</span>.</h2>

        <div class="steps">
          <div class="step"><div class="num">1</div><div class="step-label">Erstgespräch &amp; Angebot</div></div>
          <div class="step"><div class="num">2</div><div class="step-label">Konzept &amp; Texte</div></div>
          <div class="step"><div class="num">3</div><div class="step-label">Design &amp; Umsetzung</div></div>
          <div class="step"><div class="num">4</div><div class="step-label">Korrekturschleifen</div></div>
        </div>

        <div class="close">
          Mehrere Wochen später ist er live.<br>
          <span class="dim">Und jede Änderung danach kostet wieder.</span>
        </div>
      </div>

      <div class="foot">
        <div class="counter">2 / 5</div>
      </div>
    </div>
  </div>
</body>
</html>
