<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Trichterwerk — X Header (1500×500, oben/unten je ~70px Puffer, links Avatar-Overlay frei)</title>
<style>
  @font-face { font-family:'Inter'; font-style:normal; font-weight:600; src:url('file:///Users/dennissasse/Desktop/DEV/Trichterwerk/Funnelsoftware/node_modules/@fontsource/inter/files/inter-latin-600-normal.woff2') format('woff2'); }
  @font-face { font-family:'Inter'; font-style:normal; font-weight:800; src:url('file:///Users/dennissasse/Desktop/DEV/Trichterwerk/Funnelsoftware/node_modules/@fontsource/inter/files/inter-latin-800-normal.woff2') format('woff2'); }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:1500px; height:500px; overflow:hidden; background:#0E0E11; }
  body { font-family:'Inter', sans-serif; -webkit-font-smoothing:antialiased; }
  .stage { position:relative; width:1500px; height:500px; overflow:hidden; background:#0E0E11; }
  .dots { position:absolute; inset:0; background-image:radial-gradient(rgba(255,255,255,0.07) 1.5px, transparent 1.5px); background-size:38px 38px; background-position:19px 19px; }
  .glow { position:absolute; left:58%; top:50%; width:1500px; height:1100px; transform:translate(-50%,-50%);
          background:radial-gradient(ellipse, rgba(124,58,237,0.30) 0%, rgba(124,58,237,0.10) 42%, rgba(124,58,237,0) 70%); }
  .orb1 { position:absolute; width:360px; height:360px; right:-100px; top:-140px; border-radius:50%; filter:blur(80px); background:rgba(124,58,237,0.32); }

  /* Safe: y 70–430; links ~300px frei (Avatar-Overlay unten links) */
  .content { position:absolute; left:330px; right:70px; top:70px; height:360px;
             display:flex; align-items:center; justify-content:center; gap:64px; }
  .claim h1 { font-size:68px; font-weight:800; line-height:1.14; letter-spacing:-0.02em; color:#FFFFFF; white-space:nowrap; }
  .claim h1 .grad { background:linear-gradient(94deg, #C4B5FD 0%, #925CF0 55%, #7C3AED 100%);
                    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .claim .sub { margin-top:16px; font-size:30px; font-weight:600; color:rgba(242,242,242,0.72); white-space:nowrap; }
  .pill { padding:16px 30px; border-radius:999px; background:linear-gradient(180deg, #8B5CF6 0%, #7C3AED 100%);
          border:1px solid rgba(255,255,255,0.22); font-size:27px; font-weight:600; color:#fff; white-space:nowrap;
          box-shadow:0 10px 40px rgba(124,58,237,0.45); }
</style>
</head>
<body>
  <div class="stage">
    <div class="glow"></div><div class="orb1"></div><div class="dots"></div>
    <div class="content">
      <div class="claim">
        <h1>Funnels, die <span class="grad">verkaufen</span>.</h1>
        <div class="sub">Ohne Code. Ohne Agentur. DSGVO-konform aus Deutschland.</div>
      </div>
      <div class="pill">trichterwerk.de</div>
    </div>
  </div>
</body>
</html>
