<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Trichterwerk — LinkedIn Cover (4200×700, Safe: zentrale ~3350px, links unten Logo-Overlay frei)</title>
<style>
  @font-face { font-family:'Inter'; font-style:normal; font-weight:600; src:url('file:///Users/dennissasse/Desktop/DEV/Trichterwerk/Funnelsoftware/node_modules/@fontsource/inter/files/inter-latin-600-normal.woff2') format('woff2'); }
  @font-face { font-family:'Inter'; font-style:normal; font-weight:700; src:url('file:///Users/dennissasse/Desktop/DEV/Trichterwerk/Funnelsoftware/node_modules/@fontsource/inter/files/inter-latin-700-normal.woff2') format('woff2'); }
  @font-face { font-family:'Inter'; font-style:normal; font-weight:800; src:url('file:///Users/dennissasse/Desktop/DEV/Trichterwerk/Funnelsoftware/node_modules/@fontsource/inter/files/inter-latin-800-normal.woff2') format('woff2'); }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:4200px; height:700px; overflow:hidden; background:#0E0E11; }
  body { font-family:'Inter', sans-serif; -webkit-font-smoothing:antialiased; }
  .stage { position:relative; width:4200px; height:700px; overflow:hidden; background:#0E0E11; }
  .dots { position:absolute; inset:0; background-image:radial-gradient(rgba(255,255,255,0.07) 2px, transparent 2px); background-size:56px 56px; background-position:28px 28px; }
  .glow { position:absolute; left:56%; top:50%; width:3200px; height:1800px; transform:translate(-50%,-50%);
          background:radial-gradient(ellipse, rgba(124,58,237,0.30) 0%, rgba(124,58,237,0.10) 42%, rgba(124,58,237,0) 70%); }
  .orb1 { position:absolute; width:700px; height:700px; right:-200px; top:-260px; border-radius:50%; filter:blur(130px); background:rgba(124,58,237,0.32); }
  .orb2 { position:absolute; width:600px; height:600px; left:600px; bottom:-320px; border-radius:50%; filter:blur(130px); background:rgba(91,33,182,0.35); }

  /* Kernbotschaft mittig/mittig-rechts, linke ~18% + Logo-Overlay-Ecke bleiben frei */
  .content { position:absolute; left:1050px; right:450px; top:0; height:700px;
             display:flex; align-items:center; justify-content:center; gap:110px; }
  .claim h1 { font-size:120px; font-weight:800; line-height:1.12; letter-spacing:-0.02em; color:#FFFFFF; white-space:nowrap; }
  .claim h1 .grad { background:linear-gradient(94deg, #C4B5FD 0%, #925CF0 55%, #7C3AED 100%);
                    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .claim .sub { margin-top:26px; font-size:52px; font-weight:600; color:rgba(242,242,242,0.72); white-space:nowrap; }
  .chips { display:flex; flex-direction:column; gap:24px; }
  .chip { padding:22px 42px; border-radius:999px; background:rgba(255,255,255,0.06);
          border:2px solid rgba(255,255,255,0.15); font-size:42px; font-weight:600; color:#E9E9EE; white-space:nowrap; text-align:center; }
  .chip.solid { background:linear-gradient(180deg, #8B5CF6 0%, #7C3AED 100%); border-color:rgba(255,255,255,0.22); color:#fff; font-weight:700; }
</style>
</head>
<body>
  <div class="stage">
    <div class="glow"></div><div class="orb1"></div><div class="orb2"></div><div class="dots"></div>
    <div class="content">
      <div class="claim">
        <h1>Funnels, die <span class="grad">verkaufen</span>.</h1>
        <div class="sub">Ohne Code. Ohne Agentur. In unter 1&nbsp;Stunde live.</div>
      </div>
      <div class="chips">
        <div class="chip">DSGVO-konform · EU-Hosting</div>
        <div class="chip solid">trichterwerk.de</div>
      </div>
    </div>
  </div>
</body>
</html>
