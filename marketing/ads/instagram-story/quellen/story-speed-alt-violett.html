  html, body { margin:0; width:1080px; height:1920px; overflow:hidden; }

    font-family:'Inter', sans-serif;

    position:relative;

  /* ---------- Deko ---------- */
  .glow-tl {
    position:absolute; top:-320px; left:-320px; width:900px; height:900px;
    background:radial-gradient(circle, rgba(146,92,240,0.85) 0%, rgba(146,92,240,0) 65%);

  .glow-br {
    position:absolute; bottom:-260px; right:-300px; width:1000px; height:1000px;

  .stopwatch-deco {
    position:absolute; top:40px; right:-70px; width:440px; height:440px;
    opacity:0.13; transform:rotate(12deg);
  }
  .speedlines { position:absolute; left:0; top:0; width:1080px; height:1920px; pointer-events:none; }

  /* ---------- Phone (rechts angeschnitten) ---------- */
  .phone-wrap {
    position:absolute;
    right:40px; top:1408px;
    transform:rotate(-4deg);
  }
  .phone {
    width:600px; height:1240px;
    background:#17171C;
    border-radius:60px;
    padding:16px;
    box-shadow:-30px 30px 90px rgba(23,23,28,0.45), 0 0 0 2px rgba(255,255,255,0.20);
    position:relative;
  }
  .screen {
    width:100%; height:100%;
    border-radius:46px;
    overflow:hidden;
    background:#FAFAFA;
    position:relative;
  }
  .screen img {
    width:100%; height:100%;
    object-fit:cover; object-position:top;
    display:block;
  }
  .punch {
    position:absolute; top:34px; left:50%; transform:translateX(-50%);
    width:20px; height:20px; border-radius:50%;
    background:#17171C; z-index:2;
  }
  .flash-badge {
    position:absolute; top:-22px; right:8px; z-index:3;
    width:110px; height:110px; border-radius:50%;
    background:#FFFFFF;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 16px 40px rgba(23,23,28,0.35);
  }

  /* ---------- Content (linksbündig) ---------- */
  .content {
    position:absolute; left:0; top:0; width:1080px; height:1920px;
    padding-left:84px; padding-right:84px;
    display:flex; flex-direction:column; align-items:flex-start;
    text-align:left;

  .brand {

  .brand-tile {

  .brand-name { font-size:42px; font-weight:700; letter-spacing:-0.5px; color:#FFFFFF; }

  .hook {

  .pill-line { margin-top:30px; display:flex; }
  .pill {
    display:inline-flex; align-items:center; gap:22px;
    background:#FFFFFF;
    color:#6D28D9;
    border-radius:32px;
    padding:14px 44px 24px 38px;
    box-shadow:0 24px 60px rgba(23,23,28,0.30);

  .chip {

  .cta {
