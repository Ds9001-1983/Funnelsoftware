    -webkit-text-fill-color:transparent; color:transparent;

  .sub {
    margin-top:38px;
    font-size:38px; font-weight:500; line-height:1.42; color:#52525B;
    letter-spacing:-0.005em;
  }

  .chips { margin-top:46px; display:flex; flex-wrap:wrap; gap:16px; max-width:912px; }
  .chip {

  .screen {
    position:relative; width:100%; height:100%;
    border-radius:42px; overflow:hidden; background:#EFEEF8;
    padding-top:48px;
  }
  .screen img {
    width:100%; height:calc(100% - 48px); display:block;

  }
  .punch {
    position:absolute; top:12px; left:50%; transform:translateX(-50%);
    width:24px; height:24px; border-radius:50%;
    background:#0E0E11;

  /* ---- Floating Toast ---- */

  .toast-sub { font-size:24px; font-weight:500; color:#6B6B76; margin-top:4px; }
