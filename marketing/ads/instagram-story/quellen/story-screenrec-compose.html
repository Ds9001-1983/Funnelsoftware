<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Trichterwerk — Screenrecording-Komposition</title>
<style>
  @font-face { font-family:'Inter'; font-style:normal; font-weight:500; src:url('file:///Users/dennissasse/Desktop/DEV/Trichterwerk/Funnelsoftware/node_modules/@fontsource/inter/files/inter-latin-500-normal.woff2') format('woff2'); }
  @font-face { font-family:'Inter'; font-style:normal; font-weight:600; src:url('file:///Users/dennissasse/Desktop/DEV/Trichterwerk/Funnelsoftware/node_modules/@fontsource/inter/files/inter-latin-600-normal.woff2') format('woff2'); }
  @font-face { font-family:'Inter'; font-style:normal; font-weight:700; src:url('file:///Users/dennissasse/Desktop/DEV/Trichterwerk/Funnelsoftware/node_modules/@fontsource/inter/files/inter-latin-700-normal.woff2') format('woff2'); }
  @font-face { font-family:'Inter'; font-style:normal; font-weight:800; src:url('file:///Users/dennissasse/Desktop/DEV/Trichterwerk/Funnelsoftware/node_modules/@fontsource/inter/files/inter-latin-800-normal.woff2') format('woff2'); }

  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { margin:0; width:1080px; height:1920px; overflow:hidden; background:#0E0E11; }
  body { font-family:'Inter', sans-serif; -webkit-font-smoothing:antialiased; }
  .stage { position:relative; width:1080px; height:1920px; overflow:hidden; background:#0E0E11; }

  .dots {
    position:absolute; inset:0;
    background-image:radial-gradient(rgba(255,255,255,0.07) 1.5px, transparent 1.5px);
    background-size:38px 38px; background-position:19px 19px;
  }
  .glow {
    position:absolute; left:50%; top:900px; width:1600px; height:1600px;
    transform:translate(-50%,-50%);
    background:radial-gradient(circle, rgba(124,58,237,0.30) 0%, rgba(124,58,237,0.12) 34%, rgba(124,58,237,0) 66%);
  }

  .brand { position:absolute; left:0; right:0; top:268px; display:flex; align-items:center; justify-content:center; gap:16px; }
  .brand-tile {
    width:52px; height:52px; border-radius:14px;
    background:linear-gradient(135deg, #925CF0 0%, #7C3AED 55%, #5B21B6 100%);
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 8px 28px rgba(124,58,237,0.45);
  }
  .brand-name { font-size:34px; font-weight:700; color:#F2F2F2; letter-spacing:-0.01em; }

  h1 { position:absolute; left:64px; right:64px; top:336px; text-align:center;
       font-size:72px; font-weight:800; line-height:1.1; letter-spacing:-0.02em; color:#FFFFFF; }
  h1 .grad {
    background:linear-gradient(94deg, #C4B5FD 0%, #925CF0 55%, #7C3AED 100%);
    -webkit-background-clip:text; background-clip:text;
    -webkit-text-fill-color:transparent; color:transparent;
  }

  .step {
    position:absolute; left:0; right:0; top:522px;
    display:flex; justify-content:center;
  }
  .step-pill {
    display:flex; align-items:center; gap:14px;
    padding:14px 30px; border-radius:999px;
    background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.16);
    font-size:29px; font-weight:600; color:#E9E9EE;
  }
  .step-pill .num {
    width:44px; height:44px; border-radius:50%; flex:none;
    background:linear-gradient(135deg, #925CF0, #7C3AED);
    color:#fff; font-weight:800; font-size:24px;
    display:flex; align-items:center; justify-content:center;
  }

  /* Browser-Frame: Video wird per ffmpeg bei x=60,y=660 (960x600) eingelegt */
  .frame {
    position:absolute; left:52px; top:596px; width:976px; height:676px;
    background:#17171C; border-radius:22px;
    border:1.5px solid rgba(255,255,255,0.13);
    box-shadow:0 30px 110px rgba(124,58,237,0.35), 0 18px 50px rgba(0,0,0,0.6);
  }
  .chrome {
    position:absolute; left:0; right:0; top:0; height:56px;
    display:flex; align-items:center; gap:10px; padding:0 22px;
  }
  .dot { width:16px; height:16px; border-radius:50%; }
  .d1 { background:#FF5F57; } .d2 { background:#FEBC2E; } .d3 { background:#28C840; }
  .url {
    margin-left:18px; flex:1; height:34px; border-radius:10px;
    background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.10);
    display:flex; align-items:center; justify-content:center;
    font-size:20px; font-weight:500; color:rgba(242,242,242,0.66);
  }
  .screen-hole { position:absolute; left:8px; top:56px; width:960px; height:600px; background:#000; border-radius:0 0 14px 14px; }

  .cta-row { position:absolute; left:0; right:0; top:1330px; text-align:center; }
  .cta {
    display:inline-block; padding:26px 56px; border-radius:999px;
    background:linear-gradient(180deg, #8B5CF6 0%, #7C3AED 100%);
    border:1px solid rgba(255,255,255,0.22);
    font-size:34px; font-weight:700; color:#FFFFFF;
    box-shadow:0 14px 54px rgba(124,58,237,0.55), 0 4px 16px rgba(0,0,0,0.4);
  }
  .hint { margin-top:22px; font-size:25px; font-weight:500; color:rgba(242,242,242,0.60); }

  /* Endcard-Modus */
  .end-wrap { position:absolute; left:64px; right:64px; top:640px; text-align:center; display:none; }
  .end-wrap h2 { font-size:96px; font-weight:800; line-height:1.1; letter-spacing:-0.025em; color:#fff; }
  .end-check {
    width:110px; height:110px; border-radius:50%; margin:0 auto 44px;
    background:linear-gradient(135deg, #925CF0, #7C3AED);
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 18px 70px rgba(124,58,237,0.6);
  }
</style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="glow"></div>
    <div class="dots"></div>

    <div class="brand">
      <div class="brand-tile">
        <svg width="30" height="30" viewBox="0 0 32 32" fill="none">
          <path d="M6 7 H26 L18.5 19 V26 L13.5 23.5 V19 Z" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="3" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="brand-name">Trichterwerk</div>
    </div>

    <h1 id="h1">So schnell ist dein<br>Funnel <span class="grad">live</span>.</h1>

    <div class="step" id="step">
      <div class="step-pill"><span class="num" id="stepnum">1</span><span id="steptext">Vorlage wählen</span></div>
    </div>

    <div class="frame" id="frame">
      <div class="chrome">
        <div class="dot d1"></div><div class="dot d2"></div><div class="dot d3"></div>
        <div class="url">app.trichterwerk.de</div>
      </div>
      <div class="screen-hole"></div>
    </div>

    <div class="end-wrap" id="endwrap">
      <div class="end-check">
        <svg width="58" height="58" viewBox="0 0 24 24" fill="none">
          <path d="M5 12.5 L10 17.5 L19 7" stroke="#FFFFFF" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h2>Live in<br><span class="grad">unter 1&nbsp;Stunde</span>.</h2>
    </div>

    <div class="cta-row">
      <div class="cta">14 Tage kostenlos testen</div>
      <div class="hint">Jetzt unten tippen&nbsp;↓</div>
    </div>
  </div>

<script>
  const params = new URLSearchParams(location.search);
  const step = params.get('step') || '1';
  const STEPS = { '1': 'Vorlage wählen', '2': 'Texte & Design anpassen', '3': 'Veröffentlichen' };
  if (step === 'end') {
    document.getElementById('frame').style.display = 'none';
    document.getElementById('step').style.display = 'none';
    document.getElementById('h1').style.display = 'none';
    document.getElementById('endwrap').style.display = 'block';
  } else {
    document.getElementById('stepnum').textContent = step;
    document.getElementById('steptext').textContent = STEPS[step];
  }
</script>
</body>
</html>
