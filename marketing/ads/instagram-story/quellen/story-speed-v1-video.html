  * { margin:0; padding:0; box-sizing:border-box; }

  /* ---------- Deko ---------- */

  .content { position:absolute; left:64px; right:64px; top:292px; text-align:center; }

  .chips { margin-top:42px; display:flex; justify-content:center; gap:12px; flex-wrap:nowrap; }

  .cta {
    display:inline-block; margin-top:50px;

  }

  .hint { margin-top:26px; font-size:26px; font-weight:500; color:rgba(242,242,242,0.60); }

  /* ---------- Phone ---------- */
  .phone {
    position:absolute; left:50%; top:1142px; width:560px; height:1160px;
    transform:translateX(-50%) rotate(-4deg);
    background:#17171C;
    border-radius:56px;
    padding:16px;
    border:1.5px solid rgba(255,255,255,0.11);
    box-shadow:
      0 -6px 60px rgba(124,58,237,0.28),
      0 30px 120px rgba(124,58,237,0.40),
      0 20px 60px rgba(0,0,0,0.6);
  }
  .screen {
    position:relative; width:100%; height:100%;
    border-radius:42px; overflow:hidden; background:#FFFFFF;

  }
  .screen-top { position:relative; height:46px; background:#FFFFFF; flex:none; }
  .screen img {
    width:100%; flex:1; min-height:0;
    object-fit:cover; object-position:top;

  .punch {

  /* ---------- Toast ---------- */
  .toast {
    position:absolute; right:74px; top:1128px;

    background:#FFFFFF;
    box-shadow:0 18px 60px rgba(0,0,0,0.45), 0 6px 24px rgba(124,58,237,0.25);

  .toast-title { font-size:26px; font-weight:700; color:#17171C; line-height:1.2; }
  .toast-sub { font-size:21px; font-weight:500; color:#7A7A85; line-height:1.3; }

<body>
  <div class="stage">
    <div class="glow"></div>
    <div class="topwash"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="dots"></div>

    <div class="phone" id="phone">
      <div class="screen">
        <div class="screen-top"><div class="punch"></div></div>
        <img src="file:///Users/dennissasse/Desktop/DEV/Trichterwerk/Funnelsoftware/client/public/templates/portrait/termin-buchen.png" alt="">
      </div>
    </div>

    <div class="content">
      <div class="brand" id="brand">
        <div class="brand-tile">
          <svg width="34" height="34" viewBox="0 0 32 32" fill="none">
            <path d="M6 7 H26 L18.5 19 V26 L13.5 23.5 V19 Z" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="3" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="brand-name">Trichterwerk</div>
      </div>

      <h1>
        <span class="line" id="l1">Dein Funnel. Live</span><br>
        <span class="line" id="l2">in <span class="grad">unter 1&nbsp;Stunde</span>.</span>
      </h1>

      <div class="sub" id="sub">Ohne Code. Ohne Agentur. Selbst gebaut&nbsp;— mobil optimiert.</div>

      <div class="chips" id="chips">
        <div class="chip">Ohne Code</div>
        <div class="chip">DSGVO-konform</div>
        <div class="chip">Made in Germany</div>
        <div class="chip">ab 49&nbsp;€/Monat</div>
      </div>

      <div><span class="cta" id="cta">14 Tage kostenlos testen</span></div>
      <div class="hint" id="hint">Jetzt unten tippen&nbsp;↓</div>
    </div>

    <div class="toast" id="toast">
      <div class="toast-check">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
          <path d="M5 12.5 L10 17.5 L19 7" stroke="#FFFFFF" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div>
        <div class="toast-title">Funnel veröffentlicht</div>
        <div class="toast-sub">gerade eben</div>
      </div>
    </div>
  </div>

<script>
  // Deterministische Timeline: window.seek(t) setzt den kompletten Zustand für Zeitpunkt t (Sekunden).
  const $ = (id) => document.getElementById(id);
  const el = {
    brand: $('brand'), l1: $('l1'), l2: $('l2'), sub: $('sub'),
    chips: Array.from($('chips').children),
    cta: $('cta'), hint: $('hint'), phone: $('phone'), toast: $('toast'),
  };

  const clamp = (x, a, b) => Math.min(b, Math.max(a, x));
  const seg = (t, a, b) => clamp((t - a) / (b - a), 0, 1);
  const outCubic = (x) => 1 - Math.pow(1 - x, 3);
  const backOut = (x) => { const c1 = 1.30158, c3 = c1 + 1; return 1 + c3 * Math.pow(x - 1, 3) + c1 * Math.pow(x - 1, 2); };
  const TAU = Math.PI * 2;

  // Hook-first-Dramaturgie (Stories 2026): Headline + Brand sind ab Frame 1
  // vollständig lesbar (Frame 1 muss als Standbild funktionieren), alles
  // Weitere baut in den ersten ~4,5 s auf. Gesamtlänge 10 s.
  window.seek = function (t) {
    // Brand-Zeile: ab Frame 1 sichtbar (integriertes Branding, keine Intro-Karte)
    el.brand.style.opacity = 1;
    el.brand.style.transform = 'translateY(0)';

    // Headline: ab Frame 1 voll lesbar, nur minimales Settle in den ersten 0,5 s
    let p = outCubic(seg(t, 0.0, 0.5));
    el.l1.style.opacity = 1;
    el.l1.style.transform = `translateY(${(1 - p) * 12}px)`;
    el.l2.style.opacity = 1;
    el.l2.style.transform = `translateY(${(1 - p) * 12}px)`;

    // Phone: sofort hochfahren (Produkt = integriertes Branding), dann schweben
    p = outCubic(seg(t, 0.2, 1.4));
    const baseY = (1 - p) * 520;
    const floatAmp = 8 * seg(t, 1.8, 3.4);
    const floatY = Math.sin(((t - 1.8) / 3.5) * TAU) * floatAmp;
    el.phone.style.opacity = seg(t, 0.2, 0.7);
    el.phone.style.transform = `translateX(-50%) translateY(${baseY + floatY}px) rotate(-4deg)`;

    // Toast: Pop bei 1,5 s (Speed-Beweis früh), Re-Bounce bei 6,5 s
    const pt = backOut(seg(t, 1.5, 2.1));
    const rb = Math.sin(seg(t, 6.5, 7.0) * Math.PI) * 0.04;
    el.toast.style.opacity = seg(t, 1.5, 1.8);
    el.toast.style.transform = `rotate(2deg) scale(${(0.6 + 0.4 * pt) * (1 + rb)})`;

    // Subline
    p = outCubic(seg(t, 1.6, 2.3));
    el.sub.style.opacity = p;
    el.sub.style.transform = `translateY(${(1 - p) * 24}px)`;

    // Chips (gestaffelt)
    el.chips.forEach((chip, i) => {
      const s = 2.1 + i * 0.22;
      const pb = backOut(seg(t, s, s + 0.5));
      const po = outCubic(seg(t, s, s + 0.3));
      chip.style.opacity = po;
      chip.style.transform = `translateY(${(1 - pb) * 18}px) scale(${0.7 + 0.3 * pb})`;
    });

    // CTA: bei 3,6 s komplett (alles Wesentliche < 4,5 s), danach dezenter Puls
    p = outCubic(seg(t, 3.6, 4.3));
    const pulse = 1 + 0.018 * Math.sin(((t - 4.3) / 1.6) * TAU) * seg(t, 4.3, 5.3);
    el.cta.style.opacity = p;
    el.cta.style.transform = `translateY(${(1 - p) * 30}px) scale(${(0.96 + 0.04 * p) * pulse})`;

    // Hinweis mit leichtem Bob
    p = seg(t, 4.2, 4.8);
    const bob = Math.sin(((t - 4.8) / 1.6) * TAU) * 4 * seg(t, 4.8, 5.6);
    el.hint.style.opacity = p;
    el.hint.style.transform = `translateY(${bob}px)`;
  };

  window.seek(0);
</script>
</body>
