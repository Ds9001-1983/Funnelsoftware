<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Trichterwerk — Story Ad A (Dark Glow)</title>
<style>
  @font-face { font-family:'Inter'; font-style:normal; font-weight:500; src:url('file:///Users/dennissasse/Desktop/DEV/Trichterwerk/Funnelsoftware/node_modules/@fontsource/inter/files/inter-latin-500-normal.woff2') format('woff2'); }
  @font-face { font-family:'Inter'; font-style:normal; font-weight:600; src:url('file:///Users/dennissasse/Desktop/DEV/Trichterwerk/Funnelsoftware/node_modules/@fontsource/inter/files/inter-latin-600-normal.woff2') format('woff2'); }
  @font-face { font-family:'Inter'; font-style:normal; font-weight:700; src:url('file:///Users/dennissasse/Desktop/DEV/Trichterwerk/Funnelsoftware/node_modules/@fontsource/inter/files/inter-latin-700-normal.woff2') format('woff2'); }
  @font-face { font-family:'Inter'; font-style:normal; font-weight:800; src:url('file:///Users/dennissasse/Desktop/DEV/Trichterwerk/Funnelsoftware/node_modules/@fontsource/inter/files/inter-latin-800-normal.woff2') format('woff2'); }

  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { margin:0; width:1080px; height:1920px; overflow:hidden; background:#0E0E11; }
  body { font-family:'Inter', sans-serif; -webkit-font-smoothing:antialiased; }

  .stage { position:relative; width:1080px; height:1920px; overflow:hidden; background:#0E0E11; }

  /* ---------- Deko ---------- */
  .dots {
    position:absolute; inset:0;
    background-image:radial-gradient(rgba(255,255,255,0.07) 1.5px, transparent 1.5px);
    background-size:38px 38px;
    background-position:19px 19px;
  }
  .topwash {
    position:absolute; left:0; right:0; top:0; height:420px;
    background:radial-gradient(ellipse 900px 380px at 50% -120px, rgba(124,58,237,0.20) 0%, rgba(124,58,237,0) 70%);
  }
  .glow {
    position:absolute; left:50%; top:1280px; width:1500px; height:1500px;
    transform:translate(-50%,-50%);
    background:radial-gradient(circle, rgba(124,58,237,0.34) 0%, rgba(124,58,237,0.14) 34%, rgba(124,58,237,0) 66%);
  }
  .orb { position:absolute; border-radius:50%; filter:blur(90px); }
  .orb-1 { width:420px; height:420px; left:760px; top:-60px;  background:rgba(124,58,237,0.22); }
  .orb-2 { width:360px; height:360px; left:-140px; top:760px; background:rgba(91,33,182,0.30); }

  /* ---------- Content ---------- */
  .content { position:absolute; left:64px; right:64px; top:292px; text-align:center; }

  .brand { display:flex; align-items:center; justify-content:center; gap:18px; }
  .brand-tile {
    width:60px; height:60px; border-radius:16px;
    background:linear-gradient(135deg, #925CF0 0%, #7C3AED 55%, #5B21B6 100%);
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 8px 28px rgba(124,58,237,0.45);
  }
  .brand-name { font-size:40px; font-weight:700; color:#F2F2F2; letter-spacing:-0.01em; }

  h1 {
    margin-top:46px;
    font-size:102px; font-weight:800; line-height:1.06; letter-spacing:-0.025em;
    color:#FFFFFF;
  }
  h1 .grad {
    background:linear-gradient(94deg, #C4B5FD 0%, #925CF0 55%, #7C3AED 100%);
    -webkit-background-clip:text; background-clip:text;
    -webkit-text-fill-color:transparent; color:transparent;
  }

  .sub {
    margin-top:30px;
    font-size:31px; font-weight:500; line-height:1.45;
    color:rgba(242,242,242,0.74);
    white-space:nowrap;
  }

  .chips { margin-top:42px; display:flex; justify-content:center; gap:12px; flex-wrap:nowrap; }
  .chip {
    padding:13px 21px; border-radius:999px;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.15);
    font-size:24px; font-weight:600; color:#E9E9EE;
    white-space:nowrap;
  }

  .cta {
    display:inline-block; margin-top:50px;
    padding:27px 58px; border-radius:999px;
    background:linear-gradient(180deg, #8B5CF6 0%, #7C3AED 100%);
    border:1px solid rgba(255,255,255,0.22);
    font-size:35px; font-weight:700; color:#FFFFFF; letter-spacing:-0.005em;
    box-shadow:0 14px 54px rgba(124,58,237,0.55), 0 4px 16px rgba(0,0,0,0.4);
  }

  .hint { margin-top:26px; font-size:26px; font-weight:500; color:rgba(242,242,242,0.60); }

  /* ---------- Phone ---------- */
  .phone {
    position:absolute; left:50%; top:1142px; width:560px; height:1160px;
    transform:translateX(-50%) rotate(-4deg);
    background:#17171C;
    border-radius:56px;
    padding:16px;
    border:1.5px solid rgba(255,255,255,0.11);
    box-shadow:
      0 -6px 60px rgba(124,58,237,0.28),
      0 30px 120px rgba(124,58,237,0.40),
      0 20px 60px rgba(0,0,0,0.6);
  }
  .screen {
    position:relative; width:100%; height:100%;
    border-radius:42px; overflow:hidden; background:#FFFFFF;
    display:flex; flex-direction:column;
  }
  .screen-top { position:relative; height:46px; background:#FFFFFF; flex:none; }
  .screen img {
    width:100%; flex:1; min-height:0;
    object-fit:cover; object-position:top;
    display:block;
  }
  .punch {
    position:absolute; top:14px; left:50%; transform:translateX(-50%);
    width:17px; height:17px; border-radius:50%;
    background:#17171C;
  }

  /* ---------- Toast (Speed-Beweis) ---------- */
  .toast {
    position:absolute; right:74px; top:1128px;
    display:flex; align-items:center; gap:18px;
    padding:20px 30px 20px 20px; border-radius:24px;
    background:#FFFFFF;
    box-shadow:0 18px 60px rgba(0,0,0,0.45), 0 6px 24px rgba(124,58,237,0.25);
    transform:rotate(2deg);
    z-index:5;
  }
  .toast-check {
    width:52px; height:52px; border-radius:50%; flex:none;
    background:linear-gradient(135deg, #925CF0 0%, #7C3AED 100%);
    display:flex; align-items:center; justify-content:center;
  }
  .toast-title { font-size:26px; font-weight:700; color:#17171C; line-height:1.2; }
  .toast-sub { font-size:21px; font-weight:500; color:#7A7A85; line-height:1.3; }
</style>
</head>
<body>
  <div class="stage">
    <div class="glow"></div>
    <div class="topwash"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="dots"></div>

    <div class="phone">
      <div class="screen">
        <div class="screen-top"><div class="punch"></div></div>
        <img src="file:///Users/dennissasse/Desktop/DEV/Trichterwerk/Funnelsoftware/client/public/templates/portrait/termin-buchen.png" alt="">
      </div>
    </div>

    <div class="content">
      <div class="brand">
        <div class="brand-tile">
          <svg width="34" height="34" viewBox="0 0 32 32" fill="none">
            <path d="M6 7 H26 L18.5 19 V26 L13.5 23.5 V19 Z" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="3" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="brand-name">Trichterwerk</div>
      </div>

      <h1>Dein Funnel. Live<br>in <span class="grad">unter 1&nbsp;Stunde</span>.</h1>

      <div class="sub">Ohne Code. Ohne Agentur. Selbst gebaut&nbsp;— mobil optimiert.</div>

      <div class="chips">
        <div class="chip">Ohne Code</div>
        <div class="chip">DSGVO-konform</div>
        <div class="chip">Made in Germany</div>
        <div class="chip">ab 49&nbsp;€/Monat</div>
      </div>

      <div class="cta">14 Tage kostenlos testen</div>
      <div class="hint">Jetzt unten tippen&nbsp;↓</div>
    </div>

    <div class="toast">
      <div class="toast-check">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
          <path d="M5 12.5 L10 17.5 L19 7" stroke="#FFFFFF" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div>
        <div class="toast-title">Funnel veröffentlicht</div>
        <div class="toast-sub">gerade eben</div>
      </div>
    </div>
  </div>
</body>
</html>
